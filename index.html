<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Maker</title>
    <meta name="description" content="Instantly generate QR codes from links. Download as PNG or SVG.">
    <!-- Content Security Policy: only allow scripts/styles from trusted sources -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net;
        style-src 'self' https://fonts.googleapis.com;
        font-src https://fonts.gstatic.com;
        img-src 'self' data: blob:;
        connect-src 'none';
    ">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>QR Code Maker</h1>

        <!-- Link Input -->
        <div class="input-group">
            <label for="linkInput">Link</label>
            <input type="text" id="linkInput" placeholder="Enter URL here (e.g. https://example.com)" maxlength="2048" autocomplete="off" spellcheck="false">
            <button id="generateBtn" class="btn primary-btn">Generate QR</button>
        </div>

        <!-- QR Code Output -->
        <div id="qrWrapper" class="hidden">
            <div id="qrCodeContainer" class="qr-container">
                <div id="qrcode"></div>
            </div>
            <div class="download-section">
                <select id="downloadFormat">
                    <option value="png">PNG</option>
                    <option value="svg">SVG (Vector)</option>
                </select>
                <button id="downloadBtn" class="btn primary-btn">Download</button>
                <button id="clearBtn" class="btn secondary-btn">Clear</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
